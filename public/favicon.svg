      <stop offset="0%" stop-color="#3b1d6b"/>
      <stop offset="100%" stop-color="#0d0418"/>
    </radialGradient>
    <linearGradient id="rune" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8a8ff"/>
      <stop offset="100%" stop-color="#7d4dff"/>
